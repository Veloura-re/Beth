name: Beth Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Ensure only one build runs per branch/PR at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: backend/yarn.lock
      
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      
      - name: Generate Prisma Client
        run: npx prisma generate
      
      - name: Build
        run: yarn build

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./dashboard
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: dashboard/yarn.lock
      
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      
      - name: Build
        run: yarn build

  mobile-verification:
    name: Mobile Export Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: mobile/yarn.lock
      
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      
      - name: Expo Export Verification
        run: npx expo export

  mobile-android-apk:
    name: Mobile Android APK Generation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend, mobile-verification] # Only build APK if basic checks pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Optional: only build APK on merge to main
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: mobile/yarn.lock

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Android APK (Local)
        run: npx eas build --platform android --profile preview-debug --local --non-interactive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Beth-Mobile-APK
          path: mobile/*.apk
          if-no-files-found: error

